services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: jubelio_integration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jubelio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-python:
    build:
      context: ./python-version
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./python-version:/app
      - reports:/app/reports
    networks:
      - jubelio_network
    command: uvicorn api_monitoring:app --host 0.0.0.0 --port 8000 --reload

  api-node:
    build:
      context: ./nodejs-version
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nodejs-version:/app
      - /app/node_modules
      - reports:/app/reports
    networks:
      - jubelio_network
    command: node api_monitoring.js

  webhook:
    build:
      context: ./nodejs-version
      dockerfile: Dockerfile.webhook
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      WEBHOOK_PORT: 3001
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jubelio_network
    command: node webhook_receiver.js

  scheduler-python:
    build:
      context: ./python-version
      dockerfile: Dockerfile.scheduler
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./python-version:/app
      - logs:/app/logs
    networks:
      - jubelio_network
    command: python scheduler.py

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-python
    networks:
      - jubelio_network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-python
      - api-node
      - dashboard
    networks:
      - jubelio_network

volumes:
  postgres_data:
  reports:
  logs:

networks:
  jubelio_network:
    driver: bridge
events {
    worker_connections 1024;
}

http {
    upstream api_python {
        server api-python:8000;
    }
    
    upstream api_node {
        server api-node:3000;
    }
    
    upstream webhook {
        server webhook:3001;
    }
    
    upstream dashboard {
        server dashboard:80;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # Dashboard
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # API (Python)
        location /api/ {
            proxy_pass http://api_python;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Webhook
        location /webhook/ {
            proxy_pass http://webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Export endpoint
        location /export/ {
            proxy_pass http://api_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}